<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" id="theme-color" />
    <title>MSP</title>
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('msp-theme');
          const theme = saved === 'light' || saved === 'dark'
            ? saved
            : (new Date().getHours() >= 6 && new Date().getHours() < 18 ? 'light' : 'dark');
          document.documentElement.dataset.theme = theme;
          var meta = document.getElementById('theme-color');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0a0a0f' : '#f0f0f5');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
